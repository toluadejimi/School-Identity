services:
  mysql:
    image: mysql:8.4
    container_name: school_identity_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: school_identity
      MYSQL_USER: school
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
